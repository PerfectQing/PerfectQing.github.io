<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Minimalist Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background: #007BFF;
            color: white;
            width: 100%;
            padding: 1rem;
            text-align: center;
        }
        nav {
            margin: 1rem 0;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter {
            font-size: 2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Site</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <main>
        <div class="counter">
            <div>
                Current Time: <span id="current-time"></span>
            </div>
            <div>
                Focused Time: <span id="focused-time">0</span> minutes
            </div>
            <div>
                Days Together: <span id="days-together">0</span> days
            </div>
        </div>
    </main>
    <script>
        function updateTime() {
            const now = new Date();
            const utcString = now.toISOString().slice(0, 19).replace('T', ' ');
            document.getElementById('current-time').textContent = utcString;
        }
        setInterval(updateTime, 1000);
        // Placeholder for focused time
        let focusedTime = 0;
        setInterval(() => {
            focusedTime++;
            document.getElementById('focused-time').textContent = focusedTime;
        }, 60000);
        // Placeholder for days together
        let daysTogether = 0;
        setInterval(() => {
            daysTogether++;
            document.getElementById('days-together').textContent = daysTogether;
        }, 86400000);
        updateTime();
    </script>
</body>
</html>
